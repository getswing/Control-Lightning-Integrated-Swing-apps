<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login Kontrol Lampu</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body class="login-page">
    <main class="login-shell">
      <section class="login-panel">
        <p class="eyebrow">Tuya Cloud</p>
        <h1>Login</h1>
        <form id="loginForm">
          <label>
            Password
            <input id="password" type="password" autocomplete="current-password" required autofocus>
          </label>
          <button class="primary" type="submit">Masuk</button>
          <p class="form-error" id="loginError"></p>
        </form>
      </section>
    </main>
    <script src="/login.js"></script>
  </body>
</html>
